<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SMART STOCK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="css/portfolio-theme.css">
    <style>
        body {
            background-color: #11071f;
        }
        .auth-left {
            background: linear-gradient(135deg, #9857d3 0%, #3a86ff 100%);
        }
        .form-input {
            background: rgba(44, 18, 80, 0.6);
            border: 1px solid rgba(152, 87, 211, 0.3);
        }
        .form-input:focus {
            border-color: #9857d3;
            box-shadow: 0 0 0 3px rgba(152, 87, 211, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #9857d3 0%, #3a86ff 100%);
        }
        .btn-primary:hover {
            box-shadow: 0 10px 30px rgba(152, 87, 211, 0.4);
        }
    </style>
</head>
<body>
    <div id="vanta-background"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-left text-white">
                <div class="relative z-10">
                    <h1 class="text-4xl font-bold mb-4 flex items-center">
                        <i data-feather="package" class="mr-3"></i> SMART STOCK
                    </h1>
                    <p class="text-white/80 text-lg">Hệ thống quản lý kho thông minh</p>
                </div>
                <div class="relative z-10">
                    <p class="text-white/60 text-sm">Quản lý kho hàng hiệu quả với công nghệ hiện đại</p>
                    <p class="text-white/40 text-xs mt-4">&copy; 2025 SMART STOCK</p>
                </div>
            </div>
            <div class="auth-right">
                <h2 class="text-2xl font-bold text-white mb-2">Đăng nhập</h2>
                <p class="text-gray-400 mb-8">Chào mừng trở lại! Vui lòng nhập thông tin.</p>
                <form id="loginForm">
                    <div class="mb-5">
                        <label for="username" class="block text-gray-300 font-semibold mb-2">Tên đăng nhập</label>
                        <div class="relative">
                            <i data-feather="user" class="absolute left-3 top-3.5 text-gray-500"></i>
                            <input type="text" id="username" placeholder="Nhập tên đăng nhập" class="form-input pl-10 pr-4 py-3 rounded-lg w-full focus:outline-none text-white">
                        </div>
                        <div id="usernameError" class="text-red-400 text-sm mt-1 hidden"></div>
                    </div>
                    <div class="mb-5">
                        <label for="password" class="block text-gray-300 font-semibold mb-2">Mật khẩu</label>
                        <div class="relative">
                            <i data-feather="lock" class="absolute left-3 top-3.5 text-gray-500"></i>
                            <input type="password" id="password" placeholder="Nhập mật khẩu" class="form-input pl-10 pr-12 py-3 rounded-lg w-full focus:outline-none text-white">
                            <button type="button" id="togglePassword" class="absolute right-3 top-3.5 text-gray-500 hover:text-gray-300">
                                <i data-feather="eye" class="h-5 w-5"></i>
                            </button>
                        </div>
                        <div id="passwordError" class="text-red-400 text-sm mt-1 hidden"></div>
                    </div>
                    <div class="flex items-center mb-6">
                        <input type="checkbox" id="remember" class="h-4 w-4 bg-transparent border-gray-600 rounded focus:ring-purple-500">
                        <label for="remember" class="ml-2 text-gray-400 text-sm">Ghi nhớ đăng nhập</label>
                    </div>
                    <button type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold transition-all duration-300 flex items-center justify-center">
                        <span>Đăng nhập</span>
                        <i data-feather="arrow-right" class="ml-2 h-5 w-5"></i>
                    </button>
                </form>
                <div id="mainError" class="text-red-400 text-center mb-4 mt-4 hidden"></div>
                <div class="mt-8 text-center">
                    <p class="text-gray-400">Chưa có tài khoản? <a href="register.html" class="text-purple-400 font-semibold hover:text-purple-300">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
    <script>
        feather.replace();
        VANTA.GLOBE({
            el: "#vanta-background",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x9857d3,
            backgroundColor: 0x11071f,
            size: 0.8
        });
    </script>
    <script src="js/login.js"></script>
</body>
</html>
